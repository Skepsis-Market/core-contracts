[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 1      # minimizes deployment bytecode size (trades runtime gas for size)
via_ir = true
bytecode_hash = "none"  # strip CBOR metadata to save ~53 bytes of deployed bytecode
remappings = [
    "@prb/math/=lib/prb-math/src/",
    "@openzeppelin/=lib/openzeppelin-contracts/contracts/"
]

[profile.deploy]
optimizer_runs = 1
via_ir = true

[rpc_endpoints]
fuji  = "${FUJI_RPC_URL}"
local = "http://127.0.0.1:8545"

[etherscan]
fuji = { key = "${SNOWSCAN_API_KEY}", url = "https://api.routescan.io/v2/network/testnet/evm/43113/etherscan" }
