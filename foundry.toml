[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
    "@prb/math/=lib/prb-math/src/",
    "@openzeppelin/=lib/openzeppelin-contracts/contracts/"
]

[profile.deploy]
optimizer_runs = 1_000_000
via_ir = true

[rpc_endpoints]
fuji = "${FUJI_RPC_URL}"

[etherscan]
fuji = { key = "${SNOWSCAN_API_KEY}", url = "https://api.routescan.io/v2/network/testnet/evm/43113/etherscan" }
