[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 1      # minimizes deployment bytecode size (trades runtime gas for size)
via_ir = true
bytecode_hash = "none"  # strip CBOR metadata to save ~53 bytes of deployed bytecode
remappings = [
    "@prb/math/=lib/prb-math/src/",
    "@openzeppelin/=lib/openzeppelin-contracts/contracts/"
]

[profile.deploy]
optimizer_runs = 1
via_ir = true

[rpc_endpoints]
fuji        = "${FUJI_RPC_URL}"
arb_sepolia = "${ARB_SEPOLIA_RPC_URL}"
local       = "http://127.0.0.1:8545"

[etherscan]
fuji        = { key = "${SNOWSCAN_API_KEY}", url = "https://api.routescan.io/v2/network/testnet/evm/43113/etherscan" }
arb_sepolia = { key = "${ARBISCAN_API_KEY}", url = "https://api-sepolia.arbiscan.io/api", chain = 421614 }

[profile.halmos]
src = "src"
out = "out-halmos"
test = "test/halmos"
libs = ["lib"]
solc_version = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
bytecode_hash = "none"
remappings = [
    "@prb/math/=lib/prb-math/src/",
    "@openzeppelin/=lib/openzeppelin-contracts/contracts/"
]
